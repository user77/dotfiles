################
### MONITORS ###
################
# Internal 14" 165Hz display
monitor=eDP-1,2560x1600@165,0x0,1.6

################
### ENV VARS ###
################
# Use AMD for the compositor (Strix Point 880M)
env = LIBVA_DRIVER_NAME,radeonsi
env = XDG_SESSION_TYPE,wayland
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# Remove or comment out these while in Integrated mode:
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# Cursors and Toolkits
env = WLR_NO_HARDWARE_CURSORS,1
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct  # Update to qt6ct if you've moved to Plasma 6/Qt6

input {
    sensitivity = 0.5   # Adjusts the base speed (range is -1.0 to 1.0)
    force_no_accel = 1  # Set to 1 to disable mouse acceleration completely
    accel_profile = flat # Optional: sets a linear acceleration profile
}

################
### STARTUP  ###
################
exec-once = waybar
exec-once = hyprpaper
exec-once = dunst
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = hypridle
exec-once = swayosd-server

################
### KEYBINDS ###
################
$mod = SUPER

# Applications & Window Management
bind = $mod, Return, exec, kitty
bind = $mod, Q, killactive
bind = $mod, Space, exec, wofi --show drun
bind = $mod SHIFT, E, exit
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating

# Change Window Focus (Vim keys)
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Change Window Focus (Arrow keys alternative)
bind = $mod, Left, movefocus, l
bind = $mod, Right, movefocus, r
bind = $mod, Up, movefocus, u
bind = $mod, Down, movefocus, d

# Resize Windows
bind = SUPER SHIFT, left, resizeactive, -10 0
bind = SUPER SHIFT, right, resizeactive, 10 0
bind = SUPER SHIFT, up, resizeactive, 0 -10
bind = SUPER SHIFT, down, resizeactive, 0 10

# Switch Workspaces (Virtual Desktops) with $mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move Active Window to a Workspace with $mod + SHIFT + [0-9]
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with $mod + scroll wheel
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl --device=nvidia_wmi_ec_backlight set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl --device=nvidia_wmi_ec_backlight set 5%-

# Fan mode cycle (Fn+F5 maps to XF86Launch4 on TUF)
bind = , XF86Launch4, exec, asusctl fan-mode -n

# ROG key (if present) — launch ROG Control Center
bind = , XF86Launch1, exec, rog-control-center

# Keyboard backlight
bind = , XF86KbdBrightnessUp, exec, asusctl -k high
bind = , XF86KbdBrightnessDown, exec, asusctl -k low

# Volume controls with dunst notification
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && notify-send -t 1000 -h string:x-dunst-stack-tag:volume "Volume" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@)"
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && notify-send -t 1000 -h string:x-dunst-stack-tag:volume "Volume" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@)"
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && notify-send -t 1000 -h string:x-dunst-stack-tag:volume "Volume" "Muted toggle"
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

