decoration:shadow {
    color = rgba(1E202966)

    # suggested shadow setting
    #enabled = true
    #range = 60
    #offset = 1 2
    #render_power = 3
    #scale = 0.97
}

group {
    groupbar {
        col.active = rgb(bd93f9) rgb(44475a) 90deg
        col.inactive = rgba(282a36dd)
    }
}

windowrule = border_color rgb(ff5555),match:xwayland true # check if window is xwayland
windowrule = match:float true, decorate false
